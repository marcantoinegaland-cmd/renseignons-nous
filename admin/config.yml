backend:
  name: github
  repo: marcantoinegaland-cmd/renseignons-nous
  branch: main
  base_url: https://sveltia-cms-auth.marcantoine-galand.workers.dev

# Emplacement des images téléversées depuis l'admin
media_folder: content/images
public_folder: /content/images

# Langue de l'interface
locale: fr

# Noms de fichiers / URLs propres (sans accent)
slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: articles
    label: Articles
    label_singular: Article
    description: "Tes articles et analyses. « Publier » enregistre l'article et met le site à jour."
    folder: content/articles
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: date, label: Date de publication, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, picker_utc: true }
      - name: category
        label: Rubrique(s)
        widget: select
        multiple: true
        min: 1
        hint: "Tu peux en choisir plusieurs (ex. Renseignement + Défense)."
        options:
          - { label: Renseignement, value: renseignement }
          - { label: Défense, value: defense }
          - { label: Géopolitique, value: geopolitique }
      - { name: image, label: Image de une, widget: image, required: false, hint: "Sert de visuel sur la carte et en haut de l'article, et pour le partage sur les réseaux." }
      - { name: excerpt, label: "Résumé (chapô + description SEO)", widget: text, required: false, hint: "1 à 2 phrases. Affiché sous le titre, dans la liste, et utilisé par Google / les partages." }
      - { name: tags, label: Tags, widget: list, required: false, hint: "Optionnel. Mots-clés (ex. OSINT, Baltique, DGSE)." }
      - name: body
        label: Corps de l'article
        widget: markdown
        buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
        editor_components: [image]
        hint: >
          Blocs spéciaux : une image seule sur sa ligne devient une image légendée (la légende = le texte alternatif) ·
          « > [!note] … » (ou [!source], [!attention]) crée un encadré · une URL YouTube ou de tweet seule sur sa ligne s'intègre automatiquement · « --- » insère un séparateur.
      - { name: seo_title, label: "Titre SEO (optionnel)", widget: string, required: false, hint: "Titre affiché dans Google et l'onglet. Laisse vide pour reprendre le titre de l'article." }
      - { name: seo_description, label: "Description SEO (optionnel)", widget: text, required: false, hint: "Méta-description (~155 caractères) pour Google et les partages. Vide = le résumé." }
